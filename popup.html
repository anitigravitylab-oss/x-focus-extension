<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xフォーカスフィルター</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <h1>Xフォーカスフィルター</h1>

      <label class="toggle">
        <input id="enabled" type="checkbox" />
        <span>フィルタリングを有効にする</span>
      </label>

      <label class="field">
        <span>フィルターモード</span>
        <select id="mode">
          <option value="include">このキーワードに一致する投稿だけ残す</option>
          <option value="exclude">このキーワードに一致する投稿を隠す</option>
        </select>
      </label>

      <label class="field">
        <span>キーワード</span>
        <textarea
          id="keywords"
          rows="8"
          placeholder="1行に1キーワード&#10;ai&#10;startup&#10;openai"
        ></textarea>
      </label>

      <label class="toggle">
        <input id="hidePromoted" type="checkbox" />
        <span>広告投稿を隠す</span>
      </label>

      <button id="save" type="button">保存</button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
